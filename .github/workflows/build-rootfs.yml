name: Build Debian 12 ARM64 RootFS

on:
  # 手动触发（推荐）
  workflow_dispatch:
  # 可选：推送到 main 分支自动触发
  # push:
  #   branches:
  #     - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（虽然不需要，但保留以备扩展）
      - name: Checkout code
        uses: actions/checkout@v5

      # 2. 安装构建工具（debootstrap、QEMU 等）
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            qemu-user-static \
            binfmt-support \
            systemd-container

      # 3. 验证 QEMU 已注册
      - name: Verify QEMU registered
        run: |
          ls -la /proc/sys/fs/binfmt_misc/qemu-aarch64 || \
            sudo update-binfmts --enable qemu-aarch64

      # 4. 创建 rootfs 目录并执行第一阶段 debootstrap（只下载）
      - name: Bootstrap Debian 12 ARM64 (stage 1)
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"
          mkdir -p "$ROOTFS_DIR"

          sudo debootstrap \
            --foreign \
            --verbose \
            --arch=arm64 \
            --include=coreutils,bash,apt,openssh-server,systemd,systemd-sysv,sudo,curl,wget,vim-tiny,locales,net-tools,iproute2,dnsutils,ca-certificates \
            bookworm \
            "$ROOTFS_DIR" \
            http://deb.debian.org/debian/

      # 5. 复制 QEMU 静态二进制到 rootfs（用于第二阶段模拟）
      - name: Copy QEMU static binary
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"
          sudo mkdir -p "$ROOTFS_DIR/usr/bin"
          sudo cp /usr/bin/qemu-aarch64-static "$ROOTFS_DIR/usr/bin/"

      # 6. 执行第二阶段（在 chroot 内用 QEMU 完成安装）
      - name: Second stage debootstrap
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"
          # 挂载必要的文件系统（确保 chroot 内可运行）
          sudo mount --bind /dev "$ROOTFS_DIR/dev"
          sudo mount --bind /dev/pts "$ROOTFS_DIR/dev/pts"
          sudo mount -t proc proc "$ROOTFS_DIR/proc"
          sudo mount -t sysfs sys "$ROOTFS_DIR/sys"
          # 执行第二阶段
          sudo chroot "$ROOTFS_DIR" /debootstrap/debootstrap --second-stage
          # 卸载挂载
          sudo umount "$ROOTFS_DIR/dev/pts"
          sudo umount "$ROOTFS_DIR/dev"
          sudo umount "$ROOTFS_DIR/proc"
          sudo umount "$ROOTFS_DIR/sys"

      # 7. 配置基础系统（源、时区、语言、DNS、SSH、root 密码）
      - name: Configure base system
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"

          # 挂载必要的虚拟文件系统（用于后续配置）
          sudo mount --bind /dev "$ROOTFS_DIR/dev"
          sudo mount -t proc proc "$ROOTFS_DIR/proc"
          sudo mount -t sysfs sys "$ROOTFS_DIR/sys"

          # 配置 apt 源（使用官方源，可替换为国内镜像）
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "
            echo 'deb http://deb.debian.org/debian bookworm main contrib non-free' > /etc/apt/sources.list
            echo 'deb http://deb.debian.org/debian bookworm-updates main contrib non-free' >> /etc/apt/sources.list
            echo 'deb http://security.debian.org/debian-security bookworm-security main contrib non-free' >> /etc/apt/sources.list
          "

          # 设置时区
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "
            echo 'Asia/Shanghai' > /etc/timezone
            ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          "

          # 设置语言环境
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "
            apt-get update
            apt-get install -y locales
            echo 'en_US.UTF-8 UTF-8' > /etc/locale.gen
            echo 'zh_CN.UTF-8 UTF-8' >> /etc/locale.gen
            locale-gen
            update-locale LANG=en_US.UTF-8
          "

          # 配置 DNS（直接写入 /etc/resolv.conf，确保 chroot 内可用）
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "
            echo 'nameserver 8.8.8.8' > /etc/resolv.conf
            echo 'nameserver 1.1.1.1' >> /etc/resolv.conf
          "

          # 开启 SSH root 密码登录
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "
            sed -i 's/^#PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config
            sed -i 's/^PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config
            sed -i 's/^#PasswordAuthentication .*/PasswordAuthentication yes/' /etc/ssh/sshd_config
            sed -i 's/^PasswordAuthentication .*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          "

          # 设置 root 密码（默认 "root"）
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "echo 'root:root' | chpasswd"

          # 安装额外常用包（确保所有工具齐全）
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "
            apt-get update
            apt-get install -y --no-install-recommends \
              htop \
              less \
              man-db \
              nano \
              systemd-timesyncd \
              network-manager
            apt-get clean
            rm -rf /var/lib/apt/lists/*
          "

          # 清理 QEMU 静态文件（减小体积）
          sudo rm -f "$ROOTFS_DIR/usr/bin/qemu-aarch64-static"

          # 卸载挂载
          sudo umount "$ROOTFS_DIR/dev"
          sudo umount "$ROOTFS_DIR/proc"
          sudo umount "$ROOTFS_DIR/sys"

      # 8. 打包 rootfs 为 tar.gz
      - name: Package rootfs
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"
          sudo tar -C "$ROOTFS_DIR" -czf "${{ github.workspace }}/debian12-arm64-rootfs.tar.gz" .

      # 9. 上传为 GitHub Actions 产物
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: debian12-arm64-rootfs
          path: ${{ github.workspace }}/debian12-arm64-rootfs.tar.gz
          retention-days: 7
          
