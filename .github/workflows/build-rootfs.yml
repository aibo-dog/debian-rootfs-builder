name: Build Debian 12 ARM64 RootFS

on:
  # 手动触发
  workflow_dispatch:
  # 推送到 main 分支时自动触发（可选）
  # push:
  #   branches:
  #     - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（虽然本例不需要，但保留以备后续扩展）
      - name: Checkout code
        uses: actions/checkout@v5

      # 2. 安装构建工具
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            qemu-user-static \
            binfmt-support \
            systemd-container

      # 3. 验证 QEMU 已注册
      - name: Verify QEMU registered
        run: |
          ls -la /proc/sys/fs/binfmt_misc/qemu-aarch64 || \
            sudo update-binfmts --enable qemu-aarch64

      # 4. 创建 rootfs 目录并用 debootstrap 拉取基础系统
      - name: Bootstrap Debian 12 ARM64 rootfs
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"
          mkdir -p "$ROOTFS_DIR"

          # 第一阶段：拉取基础包（--foreign 表示跨架构，只下载不解包）
          sudo debootstrap \
            --foreign \
            --verbose \
            --arch=arm64 \
            bookworm \
            "$ROOTFS_DIR" \
            http://deb.debian.org/debian/

      # 5. 复制 QEMU 静态解释器到 rootfs 中
      - name: Copy QEMU static binary to rootfs
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"
          sudo mkdir -p "$ROOTFS_DIR/usr/bin"
          sudo cp /usr/bin/qemu-aarch64-static "$ROOTFS_DIR/usr/bin/"

      # 6. 执行第二阶段配置（在 chroot 中用 QEMU 模拟运行）
      - name: Second stage debootstrap (inside QEMU)
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"
          sudo chroot "$ROOTFS_DIR" /debootstrap/debootstrap --second-stage

      # 7. 基础配置：设置源、时区、语言环境等
      - name: Configure base system
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"

          # 配置 apt 源（使用官方源）
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "
            echo 'deb http://deb.debian.org/debian bookworm main contrib non-free' > /etc/apt/sources.list
            echo 'deb http://deb.debian.org/debian bookworm-updates main contrib non-free' >> /etc/apt/sources.list
            echo 'deb http://security.debian.org/debian-security bookworm-security main contrib non-free' >> /etc/apt/sources.list
          "

          # 设置时区
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "
            echo 'Asia/Shanghai' > /etc/timezone
            ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          "

          # 设置语言环境
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "
            apt-get update
            apt-get install -y locales
            echo 'en_US.UTF-8 UTF-8' > /etc/locale.gen
            echo 'zh_CN.UTF-8 UTF-8' >> /etc/locale.gen
            locale-gen
            update-locale LANG=en_US.UTF-8
          "

      # 8. 安装一些常用基础包（可选）
      - name: Install common packages
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "
            apt-get update
            apt-get install -y \
              ca-certificates \
              curl \
              wget \
              vim-tiny \
              sudo \
              systemd \
              systemd-sysv \
              network-manager \
              ssh \
              htop \
              net-tools \
              iproute2 \
              dnsutils
            apt-get clean
            rm -rf /var/lib/apt/lists/*
          "

      # 9. 设置 root 密码（可选，默认无密码）
      - name: Set root password
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"
          # 设置 root 密码为 "root"（仅用于测试，生产环境请修改）
          sudo chroot "$ROOTFS_DIR" /bin/bash -c "echo 'root:root' | chpasswd"

      # 10. 清理 rootfs 中的 QEMU 静态文件（减小体积）
      - name: Clean up QEMU static binary
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"
          sudo rm -f "$ROOTFS_DIR/usr/bin/qemu-aarch64-static"

      # 11. 打包 rootfs 为 tar 文件
      - name: Package rootfs
        run: |
          ROOTFS_DIR="${{ github.workspace }}/rootfs"
          sudo tar -C "$ROOTFS_DIR" -czf "${{ github.workspace }}/debian12-arm64-rootfs.tar.gz" .

      # 12. 上传为 GitHub Actions 产物
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: debian12-arm64-rootfs
          path: ${{ github.workspace }}/debian12-arm64-rootfs.tar.gz
          retention-days: 7

          
